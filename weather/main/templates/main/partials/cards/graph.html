{% if fragment_only %}
    {% include 'main/partials/cards/graph_fragment.html' %}
{% else %}
    <p class="widget-note">5-day forecast chart for <span id="graph-city-label-{{ card.instance_id }}">your selected city</span>.</p>
    <form
        class="weather-search"
        method="post"
        hx-post="{% url 'graph-widget' %}"
        hx-target="#graph-widget-body-{{ card.instance_id }}"
        hx-swap="innerHTML"
    >
        {% csrf_token %}
        <input type="hidden" name="card_instance_id" value="{{ card.instance_id }}">
        <input type="text" name="city" placeholder="Enter a city, e.g. Tokyo" autocomplete="off">
        <select name="metric" aria-label="Choose a weather metric">
            {% for option in graph_metrics %}
                <option value="{{ option.value }}" {% if option.value == 'temperature' %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
        </select>
        <button type="submit">Show Forecast</button>
    </form>
    <div id="graph-widget-body-{{ card.instance_id }}" class="widget-body">
        {% include 'main/partials/cards/graph_fragment.html' with card_instance_id=card.instance_id %}
    </div>
{% endif %}
