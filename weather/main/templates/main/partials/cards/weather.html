<form
    class="weather-search"
    method="post"
    hx-post="{% url 'weather-widget' %}"
    hx-target="#weather-widget-body-{{ card.instance_id }}"
    hx-swap="innerHTML"
>
    {% csrf_token %}
    <input type="text" name="city" placeholder="Type a city (e.g. Tokyo)" autocomplete="off">
    <button type="submit">Fetch Weather</button>
</form>
<div id="weather-widget-body-{{ card.instance_id }}" class="widget-body">
    {% include 'main/partials/weather_result.html' %}
</div>
